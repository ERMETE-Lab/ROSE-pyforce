name: Testing pyforce

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniconda/Mamba
      uses: conda-incubator/setup-miniconda@v3 # Use v3 for latest features
      with:
        python-version: "3.10"
        mamba-version: "*"
        channels: conda-forge
        channel-priority: true
        activate-environment: pyforce # This automatically activates it for all steps
        use-mamba: true

    - name: Install Dependencies
      shell: bash -l {0}
      run: |
        # Install the package and test runner
        pip install rose-pyforce/.
        pip install pytest

    - name: Test with pytest
      shell: bash -l {0}
      run: |
        pytest